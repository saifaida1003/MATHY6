<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Galaxy Defender - Darjah 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { font-family: 'Orbitron', sans-serif; }
        .stars {
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px;
            animation: move-stars 10s linear infinite;
        }
        @keyframes move-stars {
            from { background-position: 0 0; }
            to { background-position: 550px 550px; }
        }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10-20% { transform: translate(-3px, 0px) rotate(-1deg); }
            30-40% { transform: translate(3px, 2px) rotate(1deg); }
            50-60% { transform: translate(-1px, -1px) rotate(1deg); }
            70-80% { transform: translate(-3px, 1px) rotate(-1deg); }
            90-100% { transform: translate(1px, -2px) rotate(0deg); }
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen overflow-hidden flex items-center justify-center p-4">
    <div class="stars absolute inset-0 z-0"></div>

    <div id="game-container" class="relative z-10 w-full max-w-2xl bg-gray-900 bg-opacity-80 p-8 rounded-3xl border-4 border-blue-500 shadow-[0_0_50px_rgba(59,130,246,0.5)]">
        
        <!-- UI Atas -->
        <div class="flex justify-between items-center mb-8">
            <div class="text-left">
                <p class="text-blue-400 text-xs uppercase tracking-widest">Markah</p>
                <p id="score" class="text-2xl font-bold">0</p>
            </div>
            <div class="text-center">
                <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">MATH GALAXY</h1>
            </div>
            <div class="text-right">
                <p class="text-red-400 text-xs uppercase tracking-widest">Masa</p>
                <p id="timer" class="text-2xl font-bold">30</p>
            </div>
        </div>

        <!-- Skrin Mula -->
        <div id="start-screen" class="text-center py-10">
            <div class="mb-6 text-6xl">🚀</div>
            <h2 class="text-3xl font-bold mb-4">Sedia Untuk Beraksi?</h2>
            <p class="text-gray-400 mb-8">Selesaikan soalan matematik Darjah 6 untuk menghancurkan asteroid!</p>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 px-10 py-4 rounded-full font-bold text-xl transition-all hover:scale-105 shadow-lg">MULA PERMAINAN</button>
        </div>

        <!-- Skrin Permainan -->
        <div id="play-screen" class="hidden text-center">
            <div id="question-box" class="bg-gray-800 p-8 rounded-2xl mb-8 border border-gray-700">
                <p id="question-text" class="text-4xl md:text-5xl font-bold tracking-wider"></p>
            </div>
            <div class="grid grid-cols-2 gap-4" id="options-container">
                <!-- Butang jawapan akan dijana di sini -->
            </div>
        </div>

        <!-- Skrin Tamat -->
        <div id="end-screen" class="hidden text-center py-10">
            <h2 class="text-4xl font-bold mb-2">MISI TAMAT!</h2>
            <p id="final-status" class="text-xl text-gray-400 mb-6 font-bold"></p>
            <div class="bg-blue-900 bg-opacity-30 p-6 rounded-2xl mb-8 inline-block">
                <p class="text-sm uppercase tracking-widest text-blue-300">Markah Tertinggi</p>
                <p id="final-score" class="text-6xl font-bold">0</p>
            </div>
            <br>
            <button onclick="startGame()" class="bg-purple-600 hover:bg-purple-500 px-10 py-4 rounded-full font-bold text-xl transition-all">CUBA LAGI</button>
        </div>

    </div>

    <!-- Sound Effects (Emoji feedback) -->
    <div id="feedback" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-8xl pointer-events-none opacity-0 transition-opacity"></div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let timerId = null;
        let correctAnswer = 0;

        const screens = {
            start: document.getElementById('start-screen'),
            play: document.getElementById('play-screen'),
            end: document.getElementById('end-screen')
        };

        function showScreen(name) {
            Object.keys(screens).forEach(key => {
                screens[key].classList.add('hidden');
            });
            screens[name].classList.remove('hidden');
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            document.getElementById('score').innerText = score;
            document.getElementById('timer').innerText = timeLeft;
            showScreen('play');
            nextQuestion();
            startTimer();
        }

        function startTimer() {
            if(timerId) clearInterval(timerId);
            timerId = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function generateQuestion() {
            const types = ['pecahan', 'peratus', 'ruang', 'perpuluhan'];
            const type = types[Math.floor(Math.random() * types.length)];
            let question = "";
            let answer = 0;
            let options = [];

            if (type === 'pecahan') {
                const a = Math.floor(Math.random() * 5) + 1;
                const b = 10;
                question = `${a}/${b} daripada 100`;
                answer = (a/b) * 100;
            } else if (type === 'peratus') {
                const p = [10, 20, 25, 50][Math.floor(Math.random() * 4)];
                const val = (Math.floor(Math.random() * 8) + 1) * 20;
                question = `${p}% daripada ${val}`;
                answer = (p/100) * val;
            } else if (type === 'ruang') {
                const s = Math.floor(Math.random() * 10) + 1;
                question = `Isipadu kubus sisi ${s}cm`;
                answer = s * s * s;
            } else {
                const d1 = (Math.random() * 10).toFixed(1);
                const d2 = (Math.random() * 10).toFixed(1);
                question = `${d1} + ${d2}`;
                answer = parseFloat(d1) + parseFloat(d2);
            }

            correctAnswer = answer;
            options = [answer];
            while(options.length < 4) {
                let fake = answer + (Math.floor(Math.random() * 10) + 1) * (Math.random() > 0.5 ? 1 : -1);
                if(!options.includes(fake) && fake >= 0) options.push(fake);
            }
            return { question, options: options.sort(() => Math.random() - 0.5) };
        }

        function nextQuestion() {
            const data = generateQuestion();
            document.getElementById('question-text').innerText = data.question;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "bg-gray-800 hover:bg-blue-900 border-2 border-gray-700 p-4 rounded-xl text-2xl font-bold transition-all hover:border-blue-400";
                btn.innerText = Number.isInteger(opt) ? opt : opt.toFixed(1);
                btn.onclick = () => checkAnswer(opt, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            const feedback = document.getElementById('feedback');
            const container = document.getElementById('game-container');

            if(Math.abs(selected - correctAnswer) < 0.01) {
                score += 10;
                timeLeft += 2; // Bonus masa
                document.getElementById('score').innerText = score;
                showFeedback('💥', true);
                nextQuestion();
            } else {
                container.classList.add('shake');
                setTimeout(() => container.classList.remove('shake'), 500);
                showFeedback('❌', false);
                btn.classList.add('bg-red-900', 'border-red-500');
                btn.disabled = true;
            }
        }

        function showFeedback(emoji, isCorrect) {
            const f = document.getElementById('feedback');
            f.innerText = emoji;
            f.style.opacity = '1';
            setTimeout(() => f.style.opacity = '0', 500);
        }

        function endGame() {
            clearInterval(timerId);
            document.getElementById('final-score').innerText = score;
            let msg = "";
            if(score > 100) msg = "Pahlawan Galaksi Sejati!";
            else if(score > 50) msg = "Hebat! Teruskan Berusaha.";
            else msg = "Jangan Putus Asa, Cuba Lagi!";
            
            document.getElementById('final-status').innerText = msg;
            showScreen('end');
        }
    </script>
</body>
</html>
